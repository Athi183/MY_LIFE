<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Mastery Hub | The Battle Plan ⚔️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="exam_roadmap.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="theme-normal">
    <div id="toast" class="toast"></div>

    <div class="game-container">
        <!-- 🛡️ TOP STATUS BAR (SYNCED) -->
        <header class="game-hud status-bar hub-header">
            <div class="player-stats">
                <button class="btn-back-main" onclick="window.location.href='index.html'">← Hub</button>
                <div class="player-identity">
                    <div id="playerRank" class="rank-title">Comprehensive Mastery Hub</div>
                </div>
            </div>
            <div class="header-controls">
                <div class="xp-container">
                    <span class="xp-label">XP: <span id="playerXP">0</span> / <span id="xpToNext">100</span></span>
                    <div class="xp-bar-bg"><div id="xpFill" class="xp-bar-fill"></div></div>
                </div>
            </div>
        </header>

        <main class="battle-container">
            
            <!-- 📅 SECTION 1: EXAM OVERVIEW PANEL -->
            <section class="overview-panel">
                <div class="overview-card border-glow-blue">
                    <div class="card-tag">COMPREHENSIVE</div>
                    <div class="card-icon-big">🧠</div>
                    <div class="card-info">
                        <h3>Comprehensive Mastery</h3>
                        <p class="exam-date">GATE & Core CS Principles</p>
                        <span class="exam-status">5 SUBJECTS CONQUEST ACTIVE</span>
                    </div>
                </div>
                <!-- DELETABLE TIMETABLE CARD -->
                <div class="overview-card timetable-card" id="timetableCard">
                    <button class="delete-card-btn" onclick="deleteTimetable()">&times;</button>
                    <div class="card-tag">OFFICIAL DATES</div>
                    <img src="timetable.png" alt="University Timetable" class="timetable-img">
                </div>
            </section>

            <!-- ⚔️ SECTION 2: DAILY SYSTEM RULE (BATTLE ROUTINE) -->
            <section class="daily-system-panel-overhaul">
                <div class="system-header">
                    <h4>⚔️ COMPREHENSIVE EXECUTION HUD</h4>
                    <div class="youtube-reminder" id="ytReminder" style="display: none;">
                        <span class="yt-badge">📹 YT VIDEO DAY</span>
                    </div>
                </div>
                <div class="routine-badges">
                    <span class="routine-badge mode-ml">🏗️ DSA</span>
                    <span class="routine-badge mode-sub">💾 OS</span>
                    <span class="routine-badge mode-sub">🖥️ COA</span>
                    <span class="routine-badge mode-apt">📊 DBMS</span>
                    <span class="routine-badge mode-code">📜 FLAT</span>
                </div>
            </section>

            <!-- 📚 SECTION 3: COMPREHENSIVE MASTERY HUB -->
            <section class="syllabus-hub">
                <h3 class="section-title">📚 COMPREHENSIVE CONQUEST HUB</h3>
                <div class="syllabus-grid" id="syllabusGrid">
                    <!-- Subject cards with 5-module trackers injected here -->
                </div>
            </section>

        </main>
    </div>

    <!-- LEVEL DETAILS MODAL -->
    <div id="levelModal" class="modal">
        <div class="modal-content border-glow-cyan">
            <span class="close-btn" onclick="closeLevelModal()">&times;</span>
            <div id="levelContent">
                <!-- Level details checklist and marking complete button -->
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="exam.js"></script>
</body>
</html>
