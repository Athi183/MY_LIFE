<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analyst Dashboard | SkillUp 2027</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="da_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="theme-da">
    <div id="toast" class="toast"></div>

    <div class="game-container">
        <header class="game-hud hud-minimized">
            <div class="player-stats">
                <div class="player-avatar mini">📊</div>
                <div class="player-info mini">
                    <div id="daRank" class="rank-title mini">Data Apprentice</div>
                    <div class="xp-container mini">
                        <div class="xp-bar-bg"><div id="daXpFill" class="xp-bar-fill"></div></div>
                    </div>
                </div>
            </div>
            <div class="header-controls">
                <button class="btn-back-main" onclick="window.location.href='index.html'">← Map</button>
            </div>
        </header>

        <main id="app">
            <section class="da-hero">
                <h1>Data Analyst Path</h1>
                <p>Master the art of insights, one level at a time.</p>
                
                <div class="da-stats-row">
                    <div class="da-stat-pill">🔥 Streak: <span id="daStreak">0</span></div>
                    <div class="da-stat-pill gold">🏆 XP: <span id="daTotalXp">0</span></div>
                </div>
            </section>

            <!-- DUOLINGO STYLE PATH -->
            <div id="daPath" class="da-path-container">
                <!-- Nodes generated by JS -->
            </div>
        </main>
    </div>

    <!-- MISSION MODAL -->
    <div id="daModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeDaModal()">&times;</span>
            <div id="daModalDetails"></div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="da_logic.js"></script>
</body>
</html>
