<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Missions | SkillUp 2027</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body class="theme-normal">
    <div id="toast" class="toast"></div>

    <div class="game-container">
        <header class="game-hud hud-minimized">
            <div class="player-stats">
                <div class="player-avatar mini">🚀</div>
                <div class="player-info mini">
                    <div class="rank-title mini">Upcoming Missions</div>
                </div>
            </div>
            <div class="header-controls">
                <button class="btn-back-main" onclick="window.location.href='index.html'">← Home</button>
            </div>
        </header>

        <main class="hub-view-container">
            <div class="calendar-header" style="margin-bottom: 2.5rem;">
                <div class="calendar-titles">
                    <h4 style="color: var(--accent-gold);">Hackathons & Internships</h4>
                    <p>High-energy missions to accelerate your career</p>
                </div>
            </div>

            <div class="hub-content">
                <img src="hackathons.png" alt="Mission List" class="hub-img-full">
            </div>

            <div class="reward-preview" style="margin-top: 3rem; text-align: center;">
                <h3 style="color: var(--text-main); margin-bottom: 1rem;">🎯 Future Missions Coming Soon</h3>
                <p style="color: var(--text-muted);">This hub is ready to scale. We'll add entry links, application
                    trackers, and more resources here.</p>
            </div>
        </main>
    </div>

    <script src="shared.js"></script>
</body>

</html>
