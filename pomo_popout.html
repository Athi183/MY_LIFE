<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomo Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ebd59;
            --focus: #ff4b2b;
            --bg: rgba(10, 25, 18, 0.98);
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            user-select: none;
        }

        .glass-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent);
            backdrop-filter: blur(20px);
            z-index: -1;
        }

        #timerLabel {
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        #timer {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.2rem;
        }

        .btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        .btn.main {
            background: var(--primary);
            border: none;
            box-shadow: 0 5px 15px rgba(46, 189, 89, 0.3);
        }

        .mode-focus #timer { color: var(--focus); text-shadow: 0 0 25px rgba(255, 75, 43, 0.3); }
        .mode-break #timer { color: var(--primary); text-shadow: 0 0 25px rgba(46, 189, 89, 0.3); }
        
        .mode-focus #timerLabel { color: var(--focus); }
        .mode-break #timerLabel { color: var(--primary); }
    </style>
</head>
<body id="pomoBody" class="mode-focus">
    <div class="glass-overlay"></div>
    <div id="timerLabel">FOCUS</div>
    <div id="timer">25:00</div>
    <div class="controls">
        <button id="toggleBtn" class="btn main">▶</button>
        <button id="resetBtn" class="btn">🔁</button>
    </div>

    <script src="pomo_popout.js"></script>
</body>
</html>
